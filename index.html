<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ankara Acil Durum Haritası</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d1/Google_Maps_pin.svg/512px-Google_Maps_pin.svg.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body { padding: 0; margin: 0; background: #1a1a1a; }
        html, body, #map { height: 100%; width: 100vw; }
        
        /* Dark Mode Filtresi */
        .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out, .leaflet-control-attribution {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        .ozel-ikon { font-size: 24px; text-align: center; line-height: 24px; }
        
        #bilgi-paneli {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(25, 25, 25, 0.95); padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-family: sans-serif; text-align: center; width: 85%; max-width: 400px; color: white;
        }
        #kategori-secici {
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px;
            border: none; font-size: 16px; font-weight: bold; background-color: #333; color: white;
        }
        #en-yakin-mesafe { margin: 0 0 12px 0; font-size: 15px; font-weight: bold; color: #ff5252; }
        #yol-tarifi-btn {
            background-color: #007aff; color: white; border: none; padding: 12px 20px;
            font-size: 16px; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer;
            display: none;
        }
        .popup-yol-btn {
            background-color: #28a745; color: white; border: none; padding: 8px 15px;
            border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 8px; width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="bilgi-paneli">
    <select id="kategori-secici">
        <option value="toplanma">🟢 En Yakın Toplanma Alanı (AFAD)</option>
        <option value="eczane">💊 En Yakın Eczane (Ankara Genel)</option>
        <option value="hastane">🏥 En Yakın Hastane (Ankara Genel)</option>
    </select>
    <p id="en-yakin-mesafe">Ankara Verileri Yükleniyor... 🛰️</p>
    <button id="yol-tarifi-btn">Yol Tarifi Al</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    // 1. Harita Kurulumu (Ankara Merkez)
    var map = L.map('map').setView([39.9208, 32.8541], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    var markers = L.markerClusterGroup(); // Kümeleme grubu oluştur
    var veriSeti = [];
    var anlikLat = 0, anlikLon = 0;
    var aktifRotaCizgisi = null, kullaniciMarkeri = null;

    // 2. Statik AFAD Verileri (Örnek - Ankara Genel)
    var toplanmaAlanlari = [
        { isim: "Anıtkabir Yanı T.A.", tur: "toplanma", lat: 39.9250, lon: 32.8370 },
        { isim: "Kuğulu Park T.A.", tur: "toplanma", lat: 39.9020, lon: 32.8590 },
        { isim: "Gençlik Parkı T.A.", tur: "toplanma", lat: 39.9380, lon: 32.8530 },
        { isim: "Milli Kütüphane Önü T.A.", tur: "toplanma", lat: 39.9165, lon: 32.8335 },
        { isim: "Kelebek Su Parkı T.A.", tur: "toplanma", lat: 39.9900, lon: 32.7500 }, // Etimesgut civarı
        { isim: "Mamak Şafaktepe Parkı T.A.", tur: "toplanma", lat: 39.9280, lon: 32.9000 }
    ];
    veriSeti.push(...toplanmaAlanlari);

    // 3. Ankara Genel Canlı Veri Çekme (Overpass API)
    async function veriIndir() {
        var overpassSorgusu = `
            [out:json][timeout:30];
            (
              node["amenity"="pharmacy"](39.70,32.50,40.15,33.65);
              node["amenity"="hospital"](39.70,32.50,40.15,33.65);
            );
            out body;`;
        
        try {
            var response = await fetch("https://lz4.overpass-api.de/api/interpreter", {
                method: "POST",
                body: "data=" + encodeURIComponent(overpassSorgusu)
            });
            var data = await response.json();

            data.elements.forEach(el => {
                if(el.lat && el.lon) {
                    var tur = el.tags.amenity === "hospital" ? "hastane" : "eczane";
                    veriSeti.push({ isim: el.tags.name || (tur.toUpperCase()), tur: tur, lat: el.lat, lon: el.lon });
                }
            });

            haritayaBas();
            document.getElementById("en-yakin-mesafe").innerHTML = "Ankara Verileri Hazır! Konum aranıyor... 📍";
            canliTakip();
        } catch (e) { document.getElementById("en-yakin-mesafe").innerHTML = "Hata: Veri çekilemedi."; }
    }

    function haritayaBas() {
        markers.clearLayers();
        veriSeti.forEach(v => {
            var emoji = v.tur === "hastane" ? "🏥" : (v.tur === "eczane" ? "💊" : "🟢");
            var ikon = L.divIcon({ className: 'ozel-ikon', html: emoji, iconSize: [30,30], iconAnchor: [15,15] });
            var m = L.marker([v.lat, v.lon], { icon: ikon }).bindPopup(`
                <div style="text-align:center;"><b>${v.isim}</b><br>
                <button class="popup-yol-btn" onclick="yolAc(${v.lat}, ${v.lon})">📍 Git</button></div>
            `);
            markers.addLayer(m);
        });
        map.addLayer(markers);
    }

    window.yolAc = function(lat, lon) {
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        var url = isIOS ? `http://maps.apple.com/?daddr=${lat},${lon}&dirflg=w` : `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=walking`;
        window.open(url, '_blank');
    };

    function mesafeOlcu(lat1, lon1, lat2, lon2) {
        var R = 6371000; var rad = Math.PI / 180;
        var a = Math.sin((lat2-lat1)*rad/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin((lon2-lon1)*rad/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function rotayiGuncelle() {
        if(anlikLat === 0) return;
        var secilen = document.getElementById("kategori-secici").value;
        var enYakin = { d: Infinity, n: "", la: 0, lo: 0 };

        veriSeti.forEach(v => {
            if(v.tur === secilen) {
                var d = mesafeOlcu(anlikLat, anlikLon, v.lat, v.lon);
                if(d < enYakin.d) enYakin = { d: d, n: v.isim, la: v.lat, lo: v.lon };
            }
        });

        if(enYakin.la !== 0) {
            document.getElementById("en-yakin-mesafe").innerHTML = `Hedef: ${enYakin.n}<br>📏 Mesafe: ${Math.round(enYakin.d)} metre`;
            document.getElementById("yol-tarifi-btn").style.display = "block";
            document.getElementById("yol-tarifi-btn").onclick = () => yolAc(enYakin.la, enYakin.lo);
            
            if(aktifRotaCizgisi) map.removeLayer(aktifRotaCizgisi);
            aktifRotaCizgisi = L.polyline([[anlikLat, anlikLon], [enYakin.la, enYakin.lo]], {color: '#ff5252', weight: 4, dashArray: '10, 10'}).addTo(map);
        }
    }

    function canliTakip() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                anlikLat = pos.coords.latitude; anlikLon = pos.coords.longitude;
                if(!kullaniciMarkeri) {
                    kullaniciMarkeri = L.marker([anlikLat, anlikLon], {icon: L.divIcon({className:'ozel-ikon', html:'🔵', iconSize:[30,30]})}).addTo(map);
                    map.flyTo([anlikLat, anlikLon], 14);
                } else { kullaniciMarkeri.setLatLng([anlikLat, anlikLon]); }
                rotayiGuncelle();
            }, null, { enableHighAccuracy: true });
        }
    }

    document.getElementById("kategori-secici").onchange = rotayiGuncelle;
    veriIndir();

    // Service Worker Kaydı - GitHub Pages Uyumlu
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        // Mevcut URL'den klasör yolunu çekiyoruz
        const scope = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        
        navigator.serviceWorker.register('sw.js', { scope: scope })
            .then(reg => console.log('PWA Başarılı!'))
            .catch(err => console.log('PWA Hatası (Normaldir):', err));
    });
}
</script>
</body>
</html>
