<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ankara - Kırıkkale Acil Harita</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d1/Google_Maps_pin.svg/512px-Google_Maps_pin.svg.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body { padding: 0; margin: 0; background: #1a1a1a; overflow: hidden; }
        html, body, #map { height: 100%; width: 100vw; }
        .leaflet-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        .ozel-ikon { font-size: 24px; text-align: center; line-height: 24px; }
        #bilgi-paneli {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(25, 25, 25, 0.95); padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-family: sans-serif; text-align: center; width: 85%; max-width: 400px; color: white;
        }
        #kategori-secici {
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px;
            border: none; font-size: 16px; font-weight: bold; background-color: #333; color: white;
        }
        #en-yakin-mesafe { margin: 0 0 12px 0; font-size: 14px; font-weight: bold; color: #ff5252; }
        #yol-tarifi-btn {
            background-color: #007aff; color: white; border: none; padding: 12px 20px;
            font-size: 16px; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; display: none;
        }
        .popup-yol-btn {
            background-color: #28a745; color: white; border: none; padding: 8px 15px;
            border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 8px; width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="bilgi-paneli">
    <select id="kategori-secici">
        <option value="toplanma">🟢 En Yakın Toplanma Alanı</option>
        <option value="eczane">💊 En Yakın Eczane</option>
        <option value="hastane">🏥 En Yakın Hastane</option>
    </select>
    <p id="en-yakin-mesafe">Veriler yükleniyor... 📡</p>
    <button id="yol-tarifi-btn">Yol Tarifi Al</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    var map = L.map('map').setView([39.92, 33.10], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    var markers = L.markerClusterGroup();
    var veriSeti = [];
    var anlikLat = 0, anlikLon = 0;
    var aktifRotaCizgisi = null, kullaniciMarkeri = null;

    // Statik Veriler (Yedek Plan)
    veriSeti.push(
        { isim: "Anıtkabir Yanı T.A.", tur: "toplanma", lat: 39.9250, lon: 32.8370 },
        { isim: "Keçiören Belediye T.A.", tur: "toplanma", lat: 39.9780, lon: 32.8630 },
        { isim: "Kırıkkale Meydan T.A.", tur: "toplanma", lat: 39.8395, lon: 33.5085 },
        { isim: "Gölbaşı Sahil T.A.", tur: "toplanma", lat: 39.7890, lon: 32.8120 }
    );

    window.yolAc = function(lat, lon) {
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        var url = isIOS ? 
            `http://maps.apple.com/?daddr=${lat},${lon}&dirflg=w` : 
            `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=walking`;
        window.open(url, '_blank');
    };

    // AKILLI VERİ ÇEKME FONKSİYONU (Retry Mekanizmalı)
    async function veriIndir(denemeSayisi = 0) {
        // Sunucu listesi (Biri patlarsa diğerini deneyecek)
        const sunucular = [
            "https://overpass-api.de/api/interpreter",
            "https://lz4.overpass-api.de/api/interpreter",
            "https://z.overpass-api.de/api/interpreter"
        ];
        
        const overpassSorgusu = `[out:json][timeout:90];(node["amenity"~"pharmacy|hospital"](39.70,32.40,40.20,33.75););out body;`;
        const currentServer = sunucular[denemeSayisi % sunucular.length];

        try {
            document.getElementById("en-yakin-mesafe").innerHTML = `Veri aranıyor (Deneme ${denemeSayisi + 1})...`;
            
            const response = await fetch(currentServer, {
                method: "POST",
                body: "data=" + encodeURIComponent(overpassSorgusu)
            });

            if (!response.ok) throw new Error("Sunucu meşgul");

            const data = await response.json();
            data.elements.forEach(el => {
                var tur = el.tags.amenity === "hospital" ? "hastane" : "eczane";
                veriSeti.push({ isim: el.tags.name || tur.toUpperCase(), tur: tur, lat: el.lat, lon: el.lon });
            });

            haritayaBas();
            document.getElementById("en-yakin-mesafe").innerHTML = "Veriler Hazır! 🛰️";
            canliTakip();

        } catch (e) {
            console.error("Hata oluştu, tekrar deneniyor...", e);
            if (denemeSayisi < 5) {
                setTimeout(() => veriIndir(denemeSayisi + 1), 2000); // 2 saniye sonra tekrar dene
            } else {
                document.getElementById("en-yakin-mesafe").innerHTML = "Bağlantı zayıf, statik verilerle devam ediliyor.";
                haritayaBas(); // En azından toplanma alanlarını göster
                canliTakip();
            }
        }
    }

    function haritayaBas() {
        markers.clearLayers();
        veriSeti.forEach(v => {
            var emoji = v.tur === "hastane" ? "🏥" : (v.tur === "eczane" ? "💊" : "🟢");
            var m = L.marker([v.lat, v.lon], { 
                icon: L.divIcon({ className: 'ozel-ikon', html: emoji, iconSize:[30,30] }) 
            }).bindPopup(`<div style="color:#000"><b>${v.isim}</b><br><button class="popup-yol-btn" onclick="yolAc(${v.lat}, ${v.lon})">Yol Tarifi</button></div>`);
            markers.addLayer(m);
        });
        map.addLayer(markers);
    }

    function rotayiGuncelle() {
        if(anlikLat === 0) return;
        var secilen = document.getElementById("kategori-secici").value;
        var enYakin = { d: Infinity, n: "", la: 0, lo: 0 };

        veriSeti.forEach(v => {
            if(v.tur === secilen) {
                var R = 6371000;
                var dLat = (v.lat - anlikLat) * Math.PI / 180;
                var dLon = (v.lon - anlikLon) * Math.PI / 180;
                var a = Math.sin(dLat/2)**2 + Math.cos(anlikLat*Math.PI/180)*Math.cos(v.lat*Math.PI/180)*Math.sin(dLon/2)**2;
                var d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                if(d < enYakin.d) enYakin = { d: d, n: v.isim, la: v.lat, lo: v.lon };
            }
        });

        if(enYakin.la !== 0) {
            document.getElementById("en-yakin-mesafe").innerHTML = `En Yakın: ${enYakin.n}<br>📏 ${Math.round(enYakin.d)} Metre`;
            document.getElementById("yol-tarifi-btn").style.display = "block";
            document.getElementById("yol-tarifi-btn").onclick = () => yolAc(enYakin.la, enYakin.lo);
            if(aktifRotaCizgisi) map.removeLayer(aktifRotaCizgisi);
            aktifRotaCizgisi = L.polyline([[anlikLat, anlikLon], [enYakin.la, enYakin.lo]], {color: '#ff5252', weight: 4, dashArray: '10, 10'}).addTo(map);
        }
    }

    function canliTakip() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                anlikLat = pos.coords.latitude; anlikLon = pos.coords.longitude;
                if(!kullaniciMarkeri) {
                    kullaniciMarkeri = L.marker([anlikLat, anlikLon], {icon: L.divIcon({className:'ozel-ikon', html:'🔵'})}).addTo(map);
                    map.flyTo([anlikLat, anlikLon], 15);
                } else { kullaniciMarkeri.setLatLng([anlikLat, anlikLon]); }
                rotayiGuncelle();
            }, null, { enableHighAccuracy: true });
        }
    }

    document.getElementById("kategori-secici").onchange = rotayiGuncelle;
    veriIndir();
</script>
</body>
</html>
